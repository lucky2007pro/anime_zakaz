version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: anistream_db
    environment:
      POSTGRES_DB: ${DB_NAME:-bestmedia_db}
      POSTGRES_USER: ${DB_USER:-bestmedia_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_this}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bestmedia_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anistream_network

  # Django Web App
  web:
    build: .
    container_name: anistream_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn src.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    environment:
      ENVIRONMENT: development
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-bestmedia_db}
      DB_USER: ${DB_USER:-bestmedia_admin}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_change_this}
      DB_HOST: db
      DB_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - anistream_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: anistream_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx_config.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates (agar mavjud bo'lsa)
    depends_on:
      - web
    networks:
      - anistream_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  anistream_network:
    driver: bridge

