{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #0b0f19, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #fff;
            padding: 15px;
        }

        .box {
            text-align: center;
            padding: 40px 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 420px;
        }

        .box img {
            width: 140px;
            max-width: 60%;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 18px;
            width: 100%;
            background: #00f3ff;
            color: #000;
            font-weight: 700;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,243,255,0.4);
        }

        /* 📱 MOBILE OPTIMIZATION */
        @media (max-width: 480px) {
            .box {
                padding: 25px 18px;
                border-radius: 14px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 13px;
            }

            .box img {
                width: 110px;
            }

            .btn {
                font-size: 14px;
                padding: 11px 14px;
            }
        }
    </style>
</head>
