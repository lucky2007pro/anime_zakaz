<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestmedia Chat UI</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* =========================
   BACKGROUND
========================= */
body {
    background: url("https://i.pinimg.com/736x/1e/13/bb/1e13bb5921f018295c582c1767923fa7.jpg")
    no-repeat center center / cover;

    height: 100vh;
    display: flex;
    flex-direction: column;

    background-color: black;
}

/* =========================
   NAVBAR
========================= */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;

    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 12px;
    z-index: 1000;
}

/* TITLE */
.title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: bold;
    font-size: 15px;
}

/* BACK BUTTON */
.back-btn {
    text-decoration: none;
    color: white;
    font-size: 13px;

    padding: 6px 10px;
    border-radius: 8px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);

    transition: 0.2s;
}

.back-btn:hover {
    background: rgba(255,255,255,0.2);
}

.toggle {
    font-size: 30px;
    cursor: pointer;
    color: #bbb; /* OFF holat */

    transition: transform 0.3s ease, color 0.3s ease, text-shadow 0.3s ease;
}

/* ON holat */
.toggle.active {
    color: #00e5ff;  /* ko‘k neon */
    text-shadow: 0 0 10px #00e5ff;

    transform: rotate(180deg) scale(1.15);
}



/* =========================
   CHAT AREA
========================= */
.chat-container {
    flex: 1;
    margin-top: 50px;
    margin-bottom: 140px;
    overflow-y: auto;

    display: flex;
    flex-direction: column;
    padding: 10px;
}

/* MESSAGE */
.message {
    max-width: 75%;
    padding: 10px 14px;
    margin: 5px 0;

    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
}

/* USER MESSAGE */
.user {
    align-self: flex-end;
    background: #0088cc;
    color: white;
    border-bottom-right-radius: 0;
}

/* BOT MESSAGE */
.bot {
    align-self: flex-start;
    background: rgba(0,0,0,0.6);
    color: white;
    border-bottom-left-radius: 0;
}

/* =========================
   BUTTONS
========================= */
.buttons {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);

    padding: 10px;

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* 3 KATTA BUTTON QATOR */
.buttons .row3 {
    grid-column: span 2;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

/* BUTTON */
button {
    border: none;
    border-radius: 10px;

    background: rgba(0,0,0,0.7);
    color: white;

    font-size: 18px;
    padding: 22px;

    transition: 0.2s;
}

button:hover {
    background: rgba(255,255,255,0.15);
}

/* =========================
   TYPING ANIMATION (ROUND DOTS)
========================= */
.typing {
    align-self: flex-start;
    background: rgba(0,0,0,0.6);
    color: white;

    border-bottom-left-radius: 0;

    padding: 10px 14px;
    border-radius: 12px;
    margin: 5px 0;

    display: flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
}

/* 🔵 REAL ROUND DOTS */
.dot {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;

    animation: bounce 1.2s infinite;
}


.dot:nth-child(2) {
    animation-delay: 0.2s;
}

.dot:nth-child(3) {
    animation-delay: 0.4s;
}

/* ANIMATION */
@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
        opacity: 0.3;
    }
    50% {
        transform: translateY(-5px);
        opacity: 1;
    }
}

/* =========================
   MOBILE
========================= */
@media (max-width: 600px) {

    .message {
        font-size: 13px;
        max-width: 85%;
    }

    .buttons {
        gap: 12px;
        padding: 12px;
    }

    .buttons .row3 {
        gap: 12px;
    }

    button {
        padding: 22px 10px;
        font-size: 16px;
        border-radius: 16px;
        min-height: 70px;
    }

    .back-btn {
        padding: 12px 18px;
        font-size: 16px;
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width: 768px) {

    .buttons {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        gap: 15px;
    }

    .buttons .row3 {
        gap: 15px;
    }

    button {
        padding: 18px;
        font-size: 16px;
        border-radius: 14px;
        min-height: 65px;
    }

    .chat-container {
        margin-bottom: 160px;
    }
}

/* =========================
   POPUP
========================= */
.popup {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);

    background: rgba(0,0,0,0.8);
    color: white;

    padding: 10px 20px;
    border-radius: 10px;

    display: none;
    z-index: 2000;
}

</style>
</head>

<body>

<div class="navbar">
    <a href="{% url 'home' %}" class="back-btn">ORQAGA</a>

    <div class="title">bestmedia UI</div>

    <i id="toggleBtn"
       class="bx bxs-toggle-left toggle"
       onclick="togglePC()"></i>
</div>

<div id="popup" class="popup">
    kompyuter holatga o‘tdingiz
</div>

<div class="chat-container" id="chat"></div>

<div class="buttons">
    <button onclick="sendMsg('ega')">ega</button>
    <button onclick="sendMsg('kanal')">kanal</button>

    <div class="row3">
        <button onclick="sendMsg('guruh')">guruh</button>
        <button onclick="sendMsg('sayt')">sayt haqida</button>
        <button onclick="sendMsg('aloqa')">aloqa</button>
    </div>
</div>

<audio id="msgSound"
       src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3">
</audio>

<script>

/* =========================
   PAGE OPEN AUTO MESSAGE
========================= */
window.addEventListener("load", () => {

    setTimeout(() => {
        showTyping(() => {
            addMessage(
`Assalomu alaykum 👋\n
bu Bestmedia UI sizga yordam berish maqsadida yaratilgan,\n
sizga qanday yordam bera olaman. 😊`,
            "bot");
        });
    }, 600);

});



let pcMode = false;

/* =========================
   TYPING EFFECT
========================= */
function showTyping(callback) {
    const chat = document.getElementById("chat");

    const typing = document.createElement("div");
    typing.classList.add("message", "bot");

    typing.innerHTML = `
        <span class="dot">●</span>
        <span class="dot">●</span>
        <span class="dot">●</span>
    `;

    chat.appendChild(typing);

    chat.scrollTo({
        top: chat.scrollHeight,
        behavior: "smooth"
    });

    setTimeout(() => {
        typing.remove();
        callback();
    }, 900);
}

/* =========================
   TOGGLE PC MODE
========================= */
function togglePC() {
    const body = document.body;
    const icon = document.getElementById("toggleBtn");
    const popup = document.getElementById("popup");

    pcMode = !pcMode;

    if (pcMode) {

        icon.classList.remove("bxs-toggle-left");
        icon.classList.add("bxs-toggle-right");
        icon.classList.add("active");

        body.style.backgroundImage =
            "url('https://i.pinimg.com/736x/87/18/2b/87182be3e5d4a482a0f10083131aab6e.jpg')";
        body.style.backgroundRepeat = "no-repeat";
        body.style.backgroundPosition = "center";
        body.style.backgroundSize = "cover";
        body.style.backgroundColor = "black";

        popup.style.display = "block";
        popup.innerText = "kompyuter holatga o‘tdingiz";

        showTyping(() => addMessage("diqqat", "bot"));

        setTimeout(() => {
            showTyping(() =>
                addMessage("hozir siz mobil holatdan pc holatga o‘tdingiz", "bot")
            );
        }, 1300);

        setTimeout(() => {
            showTyping(() =>
                addMessage("💻 kompyuter holatga o‘tish tamomlandi", "bot")
            );
        }, 2600);

    } else {

        icon.classList.remove("bxs-toggle-right");
        icon.classList.add("bxs-toggle-left");
        icon.classList.remove("active");

        body.style.backgroundImage =
            "url('https://i.pinimg.com/736x/1e/13/bb/1e13bb5921f018295c582c1767923fa7.jpg')";
        body.style.backgroundRepeat = "no-repeat";
        body.style.backgroundPosition = "center";
        body.style.backgroundSize = "cover";
        body.style.backgroundColor = "black";

        popup.style.display = "none";
    }

    setTimeout(() => {
        popup.style.display = "none";
    }, 2000);
}

/* =========================
   ADD MESSAGE
========================= */
function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerHTML = text;

    chat.appendChild(div);

    chat.scrollTo({
        top: chat.scrollHeight,
        behavior: "smooth"
    });
}

/* =========================
   SOUND
========================= */
function playSound() {
    const sound = document.getElementById("msgSound");
    sound.currentTime = 0;
    sound.play();
}

/* =========================
   SEND MESSAGE (WITH TYPING)
========================= */
function sendMsg(type) {

    if (type === "kanal") {
        addMessage("kanal", "user");

        showTyping(() => {
            addMessage("👉 https://t.me/ani_best_uzb_anime", "bot");
            playSound();
        });
    }

    else if (type === "ega") {
        addMessage("ega", "user");

        showTyping(() => {
            addMessage("👤 Admin: Only_me_subaru tomonidan boshqariladi", "bot");
            playSound();
        });
    }

    else if (type === "guruh") {
        addMessage("guruh", "user");

        showTyping(() => {
            addMessage("👥 Guruh: https://t.me/ani_best_chat", "bot");
            playSound();
        });
    }

    else if (type === "sayt") {
        addMessage("sayt haqida", "user");

        showTyping(() => {
            addMessage("🌐 bu sayt UI tizimga moslashgan holda ishlanmoqda", "bot");
            playSound();
        });
    }

    else if (type === "aloqa") {
        addMessage("aloqa", "user");

        showTyping(() => {
            addMessage("📩 Telegram: @Only_me_subaru", "bot");
            playSound();
        });
    }
}

</script>

</body>
</html>
