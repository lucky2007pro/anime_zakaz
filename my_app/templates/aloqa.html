<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloqa</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f19;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: #151c2e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.03);
        }

        .telegram {
            background: #229ED9;
            color: white;
        }

        .channel {
            background: #2ecc71;
            color: white;
        }

        .link {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
        }

        .home {
            background: #ff4757;
            color: white;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .btn {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📩 Aloqa</h2>

    <!-- Admin bilan aloqa -->
    <a class="btn telegram" href="https://t.me/only_me_subaru" target="_blank">
        👨‍💻 Admin bilan aloqa
    </a>

    <!-- Kanal (tugma ko‘rinishida) -->
    <a class="btn channel" href="https://t.me/ani_best_uzb_anime" target="_blank">
        📢 Kanalga o‘tish
    </a>

    <!-- Asosiy kanal (oddiy link) -->
    <a class="btn link" href="https://t.me/ani_best_uzb_anime" target="_blank">
        🔗 Asosiy kanal: t.me/ani_best_uzb_anime
    </a>

    <!-- Home -->
    <a class="btn home" href="{% url 'home' %}">
        🏠 Asosiyga qaytish
    </a>

</div>

</body>
</html>
