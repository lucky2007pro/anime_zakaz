<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestmedia Chat UI</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* =========================
   BODY (MOBILE FIX + FULL HEIGHT)
========================= */
html, body {
    height: 100%;
}

body {
    background: url("https://i.pinimg.com/736x/1e/13/bb/1e13bb5921f018295c582c1767923fa7.jpg")
    no-repeat center center / cover;

    min-height: 100dvh; /* 🔥 mobile fix */
    display: flex;
    flex-direction: column;

    background-color: black;
}

/* =========================
   NAVBAR
========================= */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;

    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 12px;
    z-index: 1000;
}

/* TITLE */
.title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: bold;
    font-size: 15px;
}

/* BACK BUTTON */
.back-btn {
    text-decoration: none;
    color: white;
    font-size: 13px;

    padding: 6px 10px;
    border-radius: 8px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    transition: 0.2s;
}

.back-btn:hover {
    background: rgba(255,255,255,0.2);
}

.toggle {
    font-size: 30px;
    cursor: pointer;
    color: #bbb;
    transition: 0.3s;
}

.toggle.active {
    color: #00e5ff;
    text-shadow: 0 0 10px #00e5ff;
    transform: rotate(180deg) scale(1.15);
}

/* =========================
   CHAT AREA (🔥 FIXED MOBILE ISSUE)
========================= */
.chat-container {
    flex: 1;
    margin-top: 50px;

    /* 🔥 CRITICAL FIX */
    height: calc(100dvh - 50px - 140px);

    overflow-y: auto;
    scroll-behavior: smooth;

    display: flex;
    flex-direction: column;

    padding: 10px;
    padding-bottom: 200px; /* 🔥 bot panel ustiga chiqmasin */
}

/* MESSAGE */
.message {
    max-width: 75%;
    padding: 10px 14px;
    margin: 5px 0;

    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
}

.user {
    align-self: flex-end;
    background: #0088cc;
    color: white;
    border-bottom-right-radius: 0;
}

.bot {
    align-self: flex-start;
    background: rgba(0,0,0,0.6);
    color: white;
    border-bottom-left-radius: 0;
}

/* =========================
   BUTTONS (BOTTOM FIX)
========================= */
.buttons {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);

    padding: 10px;
    padding-bottom: env(safe-area-inset-bottom);

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;

    z-index: 999;
}

/* 3 BUTTON ROW */
.buttons .row3 {
    grid-column: span 2;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

button {
    border: none;
    border-radius: 10px;

    background: rgba(0,0,0,0.7);
    color: white;

    font-size: 18px;
    padding: 22px;

    transition: 0.2s;
}

button:hover {
    background: rgba(255,255,255,0.15);
}


/* =========================
   TYPING ANIMATION (ROUND DOTS)
========================= */
.typing {
    align-self: flex-start;
    background: rgba(0,0,0,0.6);
    color: white;

    border-bottom-left-radius: 0;

    padding: 10px 14px;
    border-radius: 12px;
    margin: 5px 0;

    display: flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
}

/* 🔵 REAL ROUND DOTS */
.dot {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;

    animation: bounce 1.2s infinite;
}


.dot:nth-child(2) {
    animation-delay: 0.2s;
}

.dot:nth-child(3) {
    animation-delay: 0.4s;
}

/* ANIMATION */
@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
        opacity: 0.3;
    }
    50% {
        transform: translateY(-5px);
        opacity: 1;
    }
}



/* LINK BOX */
.link-box {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* TITLE */
.link-title {
    font-size: 14px;
    color: #ccc;
}

/* COPY LINK */
.copy-link {
    padding: 8px;
    border-radius: 8px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);

    font-size: 13px;
    color: #00e5ff;
    cursor: pointer;

    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.2s;
}

.copy-link:hover {
    background: rgba(0,229,255,0.15);
}

/* BUTTON (BLUR) */
.link-btn {
    text-decoration: none;
    text-align: center;

    padding: 10px;
    border-radius: 10px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);

    color: white;
    font-weight: bold;

    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.3s;
}

.link-btn:hover {
    background: rgba(0,229,255,0.2);
    border-color: #00e5ff;
    box-shadow: 0 0 10px #00e5ff;
}

@media (max-width: 600px) {

    .message {
        font-size: 13px;
        max-width: 85%;
    }

    /* 🔥 FIX: buttonlar chatni bosib qo‘ymasligi uchun */
    .chat-container {
        padding-bottom: 200px;
    }

    .buttons {
        gap: 10px;
        padding: 12px;
    }

    .buttons .row3 {
        gap: 10px;
    }

    button {
        padding: 18px 10px;
        font-size: 15px;
        border-radius: 14px;
        min-height: 65px;
    }

    .back-btn {
        padding: 10px 14px;
        font-size: 14px;
    }
}

/* =========================
   DESKTOP FIXED VERSION
========================= */
@media (min-width: 768px) {

    .buttons {
        max-width: 800px;
        margin: 0 auto;
        padding: 18px;
        gap: 15px;
    }

    .buttons .row3 {
        gap: 15px;
    }

    button {
        padding: 16px;
        font-size: 15px;
        border-radius: 14px;
        min-height: 60px;
    }

    /* 🔥 FIX: chat pastda yashirinib qolmasligi uchun */
    .chat-container {
        padding-bottom: 180px;
    }
}

/* =========================
   POPUP
========================= */
.popup {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);

    background: rgba(0,0,0,0.8);
    color: white;

    padding: 10px 20px;
    border-radius: 10px;

    display: none;
    z-index: 2000;
}

</style>
</head>

<body>

<script>

/* =========================

========================= */

`Assalomu alaykum 👋\n
bu Bestmedia UI sizga yordam berish maqsadida yaratilgan,\n

let pcMode = false;

/* =========================
   TYPING EFFECT
========================= */
function showTyping(callback) {
    const chat = document.getElementById("chat");

    const typing = document.createElement("div");
    typing.classList.add("message", "bot");

    typing.innerHTML = `
        <span class="dot">●</span>
        <span class="dot">●</span>
        <span class="dot">●</span>

    chat.appendChild(typing);

    chat.scrollTo({
        top: chat.scrollHeight,
        behavior: "smooth"

        typing.remove();

    }, 900);
}

/* =========================
   TOGGLE PC MODE
========================= */
function togglePC() {

            "url('https://i.pinimg.com/736x/87/18/2b/87182be3e5d4a482a0f10083131aab6e.jpg')";
        body.style.backgroundRepeat = "no-repeat";
        body.style.backgroundPosition = "center";
        body.style.backgroundSize = "cover";
        body.style.backgroundColor = "black";

        popup.style.display = "block";

        showTyping(() => addMessage("diqqat", "bot"));

            );

        setTimeout(() => {
            showTyping(() =>
                addMessage("💻 kompyuter holatga o‘tish tamomlandi", "bot")
            );
        }, 2600);

    } else {

        icon.classList.remove("bxs-toggle-right");
        icon.classList.add("bxs-toggle-left");
        icon.classList.remove("active");

        body.style.backgroundImage =
            "url('https://i.pinimg.com/736x/1e/13/bb/1e13bb5921f018295c582c1767923fa7.jpg')";
        body.style.backgroundRepeat = "no-repeat";
        body.style.backgroundPosition = "center";
        body.style.backgroundSize = "cover";
        body.style.backgroundColor = "black";

        popup.style.display = "none";
    }

    setTimeout(() => {
        popup.style.display = "none";
    }, 2000);
}

/* =========================
   ADD MESSAGE
========================= */
function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerHTML = text;

    chat.appendChild(div);

    chat.scrollTo({
        top: chat.scrollHeight,
        behavior: "smooth"
    });
}

/* =========================
   SOUND
========================= */
function playSound() {
    const sound = document.getElementById("msgSound");

    sound.play();
}

/* =========================
   COPY LINK (FIXED)
========================= */
function copyLink(el) {
    const text = el.getAttribute("data-link");

    navigator.clipboard.writeText(text).then(() => {
        el.innerText = "✅ Nusxa olindi!";

        setTimeout(() => {
            el.innerText = text;
        }, 1500);
    });
}

</script>
