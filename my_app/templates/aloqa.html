<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Chat UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    background: url("https://i.pinimg.com/736x/1e/13/bb/1e13bb5921f018295c582c1767923fa7.jpg") no-repeat center center/cover;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;

    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 12px;
    z-index: 1000;
}

/* TITLE */
.title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: bold;
    font-size: 15px;
}

/* BACK BUTTON */
.back-btn {
    text-decoration: none;
    color: white;
    font-size: 13px;

    padding: 6px 10px;
    border-radius: 8px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);

    transition: 0.2s;
}

.back-btn:hover {
    background: rgba(255,255,255,0.2);
}

/* CHAT */
.chat-container {
    flex: 1;
    margin-top: 50px;
    margin-bottom: 90px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 10px;
}

/* MESSAGE */
.message {
    max-width: 75%;
    padding: 10px 14px;
    margin: 5px 0;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
}

/* USER */
.user {
    align-self: flex-end;
    background: #0088cc;
    color: white;
    border-bottom-right-radius: 0;
}

/* BOT */
.bot {
    align-self: flex-start;
    background: rgba(0,0,0,0.6);
    color: white;
    border-bottom-left-radius: 0;
}

/* BUTTONS */
.buttons {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);

    padding: 10px;

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.buttons .row3 {
    grid-column: span 2;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

/* BUTTON */
button {
    padding: 10px;
    border: none;
    border-radius: 10px;

    background: rgba(0,0,0,0.7);
    color: white;

    font-size: 12px;
    cursor: pointer;

    transition: 0.2s;
}

button:hover {
    background: rgba(255,255,255,0.15);
}

/* MOBILE */
@media (max-width: 600px) {

    .message {
        font-size: 13px;
        max-width: 85%;
    }

    .buttons {
        gap: 12px;
        padding: 12px;
    }

    .buttons .row3 {
        gap: 12px;
    }

    button {
        padding: 22px 10px;
        font-size: 16px;
        border-radius: 16px;
        min-height: 70px;
    }

    .back-btn {
        padding: 12px 18px;
        font-size: 16px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="{% url 'home' %}" class="back-btn">ORQAGA</a>
    <div class="title">bestmedia UI</div>
</div>

<!-- CHAT -->
<div class="chat-container" id="chat"></div>

<!-- BUTTONS -->
<div class="buttons">

    <button onclick="sendMsg('ega')">ega</button>
    <button onclick="sendMsg('kanal')">kanal</button>

    <div class="row3">
        <button onclick="sendMsg('guruh')">guruh</button>
        <button onclick="sendMsg('sayt')">sayt haqida</button>
        <button onclick="sendMsg('aloqa')">aloqa</button>
    </div>

</div>

<script>

function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerHTML = text;

    chat.appendChild(div);

    setTimeout(() => {
        chat.scrollTo({
            top: chat.scrollHeight,
            behavior: "smooth"
        });
    }, 50);
}

function sendMsg(type) {

    if(type === "kanal") {
        addMessage("kanal", "user");

        setTimeout(() => {
            addMessage("👉 https://t.me/ani_best_uzb_anime", "bot");
        }, 400);
    }

    else if(type === "ega") {
        addMessage("ega", "user");

        setTimeout(() => {
            addMessage("👤 Admin: Only_me_subaru tomonidan boshqariladi", "bot");
        }, 400);
    }

    else if(type === "guruh") {
        addMessage("guruh", "user");

        setTimeout(() => {
            addMessage("👥 Guruh: https://t.me/ani_best_chat", "bot");
        }, 400);
    }

    else if(type === "sayt") {
        addMessage("sayt haqida", "user");

        setTimeout(() => {
            addMessage("🌐 bu sayt UI tizimga moslashgan holda ishlanmoqda", "bot");
        }, 400);
    }

    else if(type === "aloqa") {
        addMessage("aloqa", "user");

        setTimeout(() => {
            addMessage("📩 Telegram: @Only_me_subaru", "bot");
        }, 400);
    }
}

</script>

</body>
</html>
