{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0b0f19, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .box {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 420px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Telegram button style */
        .telegram {
            background: #229ED9;
        }

        .telegram:hover {
            background: #1a8dc4;
        }

        /* Admin button */
        .admin {
            background: #8b5cf6;
        }

        .admin:hover {
            background: #7c3aed;
        }

        /* Back button */
        .back {
            margin-top: 20px;
            background: #00f3ff;
            color: #000;
        }

        .back:hover {
            box-shadow: 0 10px 25px rgba(0,243,255,0.4);
        }

    </style>
</head>

<body>

<div class="box">

    <div class="title">📩 Aloqa</div>

    <!-- CHANNEL -->
    <a href="https://t.me/ani_best_uzb_anime" target="_blank" class="btn telegram">
        <i class='bx bxl-telegram'></i>
        Kanalga o‘tish
    </a>

    <!-- ADMIN -->
    <a href="https://t.me/only_me_subaru" target="_blank" class="btn admin">
        <i class='bx bx-user'></i>
        Admin bilan bog‘lanish
    </a>

    <!-- BACK -->
    <a href="{% url 'home' %}" class="btn back">
        <i class='bx bx-home-alt'></i>
        Bosh sahifaga qaytish
    </a>

</div>

</body>
</html>
