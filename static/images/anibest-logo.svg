<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Ani Best Sparkle Logo</title>
  <desc id="desc">Gradient sparkle icon inspired by modern assistant-style branding</desc>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2b2558"/>
      <stop offset="60%" stop-color="#17142f"/>
      <stop offset="100%" stop-color="#0b0a17"/>
    </radialGradient>
    <linearGradient id="spark" x1="20%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#7de3ff"/>
      <stop offset="45%" stop-color="#7a8bff"/>
      <stop offset="100%" stop-color="#d36bff"/>
    </linearGradient>
    <linearGradient id="sparkSoft" x1="10%" y1="10%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8eeff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#cf9bff" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="outerGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bgGlow)"/>

  <g filter="url(#outerGlow)" transform="translate(128 128)">
    <path fill="url(#spark)" d="M0 -86 L18 -18 L86 0 L18 18 L0 86 L-18 18 L-86 0 L-18 -18 Z"/>
    <path fill="url(#sparkSoft)" d="M0 -58 L12 -12 L58 0 L12 12 L0 58 L-12 12 L-58 0 L-12 -12 Z"/>
    <circle cx="58" cy="-56" r="7" fill="#9eeaff"/>
    <circle cx="-60" cy="54" r="5" fill="#c79bff"/>
  </g>
</svg>

